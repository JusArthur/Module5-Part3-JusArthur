version: '3.8'

services:
  # 1. mongo
  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongo_data:/data/db

  # 2. backend
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/bank_app
      - SECRET_KEY=supersecretkey
    depends_on:
      - mongo

  # 3. transactions 
  transactions:
    build: ./transactions
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/bank_app
    depends_on:
      - mongo

  # 4. frontend
  frontend:
    build: ./studentportfolio
    ports:
      - "8080:80"
    depends_on:
      - backend
      - transactions

  # 5. nginx
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - transactions

volumes:
  mongo_data: